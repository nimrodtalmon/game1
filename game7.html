<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DRIFT//ZONE</title>
  <link rel="manifest" href="manifest-game7.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0f">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    canvas { display: block; touch-action: none; }
    #back { position: fixed; top: 1rem; left: 1rem; color: #00ff9f55; font-size: 0.75rem; text-decoration: none; letter-spacing: 0.15em; font-family: monospace; z-index: 10; }
    #back:hover { color: #00ff9f; }
  </style>
</head>
<body>
  <a href="index.html" id="back">← back</a>
  <canvas id="c"></canvas>
  <script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  const W = 400, H = 600;
  const GREEN = '#00ff9f', PINK = '#ff00c8', CYAN = '#00d4ff';

  // scale canvas to fit screen
  let scale = 1;
  function resize() {
    scale = Math.min(innerWidth / W, innerHeight / H);
    canvas.width  = W;
    canvas.height = H;
    canvas.style.width  = W * scale + 'px';
    canvas.style.height = H * scale + 'px';
  }
  resize();
  window.addEventListener('resize', resize);

  // road bounds
  const RL = 80, RR = 320;   // left / right edge of road
  const LANE = (RR - RL) / 3; // lane width ~80

  // player
  const PW = 28, PH = 48;
  const PY = H - 110;

  // state
  let mode, px, ptx, traffic, score, spd, frame, dashOff, best;
  let leftDown = false, rightDown = false;

  best = +(localStorage.getItem('dz_best') || 0);

  function init() {
    mode    = 'play';
    px      = W / 2;
    ptx     = W / 2;
    traffic = [];
    score   = 0;
    spd     = 3;
    frame   = 0;
    dashOff = 0;
  }

  // spawn a traffic car
  function spawn() {
    const lane  = Math.floor(Math.random() * 3);
    const cols  = [PINK, CYAN, '#ffee44', '#ff8822', '#cc44ff'];
    const color = cols[Math.floor(Math.random() * cols.length)];
    traffic.push({
      x: RL + lane * LANE + LANE / 2,
      y: -50,
      w: 26 + Math.random() * 8,
      h: 42 + Math.random() * 16,
      color,
      vy: spd * (0.85 + Math.random() * 0.35),
    });
  }

  // input
  let lId = -1, rId = -1;

  canvas.addEventListener('pointerdown', e => {
    e.preventDefault();
    if (mode !== 'play') { init(); return; }
    const cx = (e.clientX - canvas.getBoundingClientRect().left) / scale;
    if (cx < W / 2) { leftDown  = true; lId = e.pointerId; }
    else            { rightDown = true; rId = e.pointerId; }
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointerup', e => {
    if (e.pointerId === lId) { leftDown  = false; lId = -1; }
    if (e.pointerId === rId) { rightDown = false; rId = -1; }
  });
  canvas.addEventListener('pointercancel', e => {
    if (e.pointerId === lId) { leftDown  = false; lId = -1; }
    if (e.pointerId === rId) { rightDown = false; rId = -1; }
  });
  document.addEventListener('keydown', e => {
    if (mode !== 'play') { if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); init(); } return; }
    if (e.code === 'ArrowLeft'  || e.code === 'KeyA') leftDown  = true;
    if (e.code === 'ArrowRight' || e.code === 'KeyD') rightDown = true;
  });
  document.addEventListener('keyup', e => {
    if (e.code === 'ArrowLeft'  || e.code === 'KeyA') leftDown  = false;
    if (e.code === 'ArrowRight' || e.code === 'KeyD') rightDown = false;
  });

  function update() {
    if (mode !== 'play') return;

    frame++;
    spd     = 3 + frame * 0.0014;
    score  += spd * 0.07;
    dashOff = (dashOff + spd) % 40;

    // steer
    if (leftDown)  ptx = Math.max(RL + PW / 2, ptx - 5);
    if (rightDown) ptx = Math.min(RR - PW / 2, ptx + 5);
    px += (ptx - px) * 0.18;

    // spawn
    const interval = Math.max(22, 60 - frame * 0.035);
    if (frame % Math.floor(interval) === 0) spawn();

    // move traffic
    for (const t of traffic) t.y += t.vy;
    traffic = traffic.filter(t => t.y < H + 60);

    // collision
    for (const t of traffic) {
      if (Math.abs(t.x - px)  < (PW / 2 + t.w / 2 - 4) &&
          Math.abs(t.y - PY)  < (PH / 2 + t.h / 2 - 4)) {
        if (score > best) { best = Math.floor(score); localStorage.setItem('dz_best', best); }
        mode = 'dead';
        return;
      }
    }
  }

  function drawCar(x, y, w, h, color) {
    // glow
    ctx.shadowColor = color;
    ctx.shadowBlur  = 14;
    ctx.fillStyle   = color;
    ctx.fillRect(x - w / 2, y - h / 2, w, h);
    ctx.shadowBlur  = 0;
    // windshield
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(x - w / 2 + 3, y - h / 2 + 5, w - 6, h * 0.26);
  }

  function draw() {
    // background
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, W, H);

    // road surface
    ctx.fillStyle = '#0d0d1a';
    ctx.fillRect(RL, 0, RR - RL, H);

    // lane dashes
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.setLineDash([22, 22]);
    ctx.lineDashOffset = -dashOff;
    ctx.lineWidth = 2;
    for (let i = 1; i < 3; i++) {
      const x = RL + LANE * i;
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    ctx.restore();

    // road edges
    ctx.shadowColor = GREEN;
    ctx.shadowBlur  = 10;
    ctx.strokeStyle = GREEN + '88';
    ctx.lineWidth   = 2;
    ctx.beginPath(); ctx.moveTo(RL, 0); ctx.lineTo(RL, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(RR, 0); ctx.lineTo(RR, H); ctx.stroke();
    ctx.shadowBlur  = 0;

    // traffic
    for (const t of traffic) drawCar(t.x, t.y, t.w, t.h, t.color);

    // player
    drawCar(px, PY, PW, PH, GREEN);
    // player headlights
    ctx.fillStyle = 'rgba(255,255,200,0.9)';
    ctx.fillRect(px - PW / 2 + 2, PY - PH / 2 + 2, 7, 4);
    ctx.fillRect(px + PW / 2 - 9, PY - PH / 2 + 2, 7, 4);
    // taillights
    ctx.shadowColor = PINK; ctx.shadowBlur = 8;
    ctx.fillStyle = PINK;
    ctx.fillRect(px - PW / 2 + 2, PY + PH / 2 - 6, 7, 4);
    ctx.fillRect(px + PW / 2 - 9, PY + PH / 2 - 6, 7, 4);
    ctx.shadowBlur = 0;

    // score
    ctx.shadowColor = GREEN; ctx.shadowBlur = 8;
    ctx.fillStyle   = GREEN;
    ctx.font        = '20px monospace';
    ctx.textAlign   = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(Math.floor(score).toString().padStart(6, '0'), W / 2, 24);
    ctx.shadowBlur  = 0;
    if (best > 0) {
      ctx.fillStyle = GREEN + '44';
      ctx.font = '10px monospace';
      ctx.textAlign = 'right';
      ctx.fillText('best:' + best, W - 10, 24);
    }

    // tap buttons
    for (const [bx, held, label] of [[10, leftDown, '◀'], [W - 80, rightDown, '▶']]) {
      ctx.fillStyle   = held ? 'rgba(0,255,159,0.2)' : 'rgba(0,255,159,0.06)';
      ctx.strokeStyle = held ? GREEN + '99' : GREEN + '33';
      ctx.lineWidth   = 1;
      ctx.fillRect(bx, H - 66, 70, 52);
      ctx.strokeRect(bx, H - 66, 70, 52);
      ctx.shadowColor = GREEN; ctx.shadowBlur = held ? 12 : 0;
      ctx.fillStyle   = held ? GREEN : GREEN + '66';
      ctx.font        = '22px monospace';
      ctx.textAlign   = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, bx + 35, H - 40);
      ctx.shadowBlur  = 0;
    }

    // overlay
    if (mode === 'start' || mode === 'dead') {
      ctx.fillStyle = 'rgba(10,10,15,0.82)';
      ctx.fillRect(0, 0, W, H);

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      if (mode === 'start') {
        ctx.shadowColor = GREEN; ctx.shadowBlur = 22;
        ctx.fillStyle   = GREEN; ctx.font = '34px monospace';
        ctx.fillText('DRIFT//ZONE', W / 2, H / 2 - 90);
        ctx.shadowBlur  = 0;
        ctx.fillStyle   = '#ffffff55'; ctx.font = '12px monospace';
        ctx.fillText('dodge the traffic', W / 2, H / 2 - 40);
        ctx.fillText('tap left / right to steer', W / 2, H / 2 - 16);
        ctx.shadowColor = PINK; ctx.shadowBlur = 12;
        ctx.fillStyle   = PINK; ctx.font = '16px monospace';
        ctx.fillText('[ tap to start ]', W / 2, H / 2 + 70);
        ctx.shadowBlur  = 0;
        if (best > 0) { ctx.fillStyle = GREEN + '55'; ctx.font = '11px monospace'; ctx.fillText('best: ' + best, W / 2, H / 2 + 106); }
      } else {
        ctx.shadowColor = PINK; ctx.shadowBlur = 22;
        ctx.fillStyle   = PINK; ctx.font = '28px monospace';
        ctx.fillText('// CRASH //', W / 2, H / 2 - 80);
        ctx.shadowBlur  = 0;
        ctx.fillStyle   = GREEN; ctx.font = '22px monospace';
        ctx.fillText('score  ' + Math.floor(score), W / 2, H / 2 - 24);
        ctx.fillStyle   = GREEN + '77'; ctx.font = '15px monospace';
        ctx.fillText('best   ' + best, W / 2, H / 2 + 14);
        ctx.shadowColor = GREEN; ctx.shadowBlur = 10;
        ctx.fillStyle   = GREEN; ctx.font = '15px monospace';
        ctx.fillText('[ tap to retry ]', W / 2, H / 2 + 66);
        ctx.shadowBlur  = 0;
      }
    }
  }

  // start in 'start' mode so overlay shows immediately
  mode    = 'start';
  px      = W / 2;
  ptx     = W / 2;
  traffic = [];
  score   = 0;
  spd     = 3;
  frame   = 0;
  dashOff = 0;

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }
  loop();
  </script>
</body>
</html>
